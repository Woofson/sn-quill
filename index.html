<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://app.standardnotes.com/component-relay.js"></script>
  <style>
    body { margin: 0; background: #1a1a1a; font-family: sans-serif; overflow: hidden; touch-action: none; }
    #toolbar {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      background: #222; padding: 10px; border-radius: 20px; z-index: 10;
      display: flex; gap: 10px; border: 1px solid #444;
    }
    #hwCanvas { background: #fdfcf0; display: block; margin: 0 auto; cursor: crosshair; touch-action: none; }
    select { background: #333; color: white; border: 1px solid #555; padding: 5px; }
  </style>
</head>
<body>

<div id="toolbar">
  <select id="penColor">
    <option value="#000000">Black</option>
    <option value="#0000FF">Blue</option>
  </select>
  <button id="clearBtn" style="background:#444; color:white; border:none; padding:5px 10px; border-radius:4px;">Clear</button>
</div>

<canvas id="hwCanvas"></canvas>

<script>
  const canvas = document.getElementById('hwCanvas');
  const ctx = canvas.getContext('2d');
  let isDrawing = false;

  // Bridge init
  const bridge = new ComponentRelay({
    targetWindow: window,
    onReady: () => { console.log("Bridge Ready"); }
  });

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.fillStyle = '#fdfcf0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function start(e) {
    isDrawing = true;
    ctx.beginPath();
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.strokeStyle = document.getElementById('penColor').value;
    ctx.moveTo(e.clientX, e.clientY);
    e.preventDefault();
  }

  function move(e) {
    if (!isDrawing) return;
    ctx.lineTo(e.clientX, e.clientY);
    ctx.stroke();
    e.preventDefault();
  }

  function stop() {
    if (isDrawing) {
      isDrawing = false;
      save();
    }
  }

  // Basic Listeners
  canvas.addEventListener('pointerdown', start);
  window.addEventListener('pointermove', move);
  window.addEventListener('pointerup', stop);

  document.getElementById('clearBtn').onclick = () => {
    ctx.fillStyle = '#fdfcf0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    save();
  };

  function save() {
    bridge.saveItemWithPayload({
      content: {
        text: JSON.stringify({ imageData: canvas.toDataURL("image/png") }),
        preview_title: "Quill Sketch"
      }
    });
  }

  function render() {
    bridge.streamContextItem((item) => {
      if (item.content.text) {
        try {
          const data = JSON.parse(item.content.text);
          if (data.imageData) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = data.imageData;
          }
        } catch(e) {}
      }
    });
  }

  window.addEventListener('resize', resize);
  resize();
  render();
</script>
</body>
</html>
