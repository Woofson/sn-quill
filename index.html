<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://app.standardnotes.com/component-relay.js"></script>
  <style>
    :root {
      --paper-white: #fdfcf0;
      --grid-color: rgba(0, 0, 0, 0.08);
    }

    body, html { 
      margin: 0; padding: 0; height: 100%; 
      background: #1a1a1a; overflow: hidden; 
      font-family: sans-serif;
    }

    #toolbar {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      background: #222; padding: 8px 15px; border-radius: 25px; 
      display: flex; gap: 10px; z-index: 100; border: 1px solid #444;
      align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    #canvas-container {
      height: 100vh; width: 100vw; display: flex; 
      justify-content: center; align-items: flex-start; 
      overflow: auto; padding-top: 70px;
    }

    canvas {
      background-color: var(--paper-white);
      touch-action: none;
      display: block;
    }

    .tpl-lines { background-image: linear-gradient(var(--grid-color) 1px, transparent 1px); background-size: 100% 32px; }
    .tpl-grid { background-image: radial-gradient(var(--grid-color) 1.5px, transparent 1.5px); background-size: 28px 28px; }

    select { background: #333; color: #eee; border: 1px solid #555; padding: 5px; border-radius: 4px; }
  </style>
</head>
<body>

<div id="toolbar">
  <select id="penColor">
    <option value="#18181b">Black</option>
    <option value="#1e3a8a">Blue</option>
    <option value="#b91c1c">Red</option>
  </select>
  
  <select id="tool">
    <option value="pen">Pen</option>
    <option value="eraser">Eraser</option>
  </select>

  <select id="paperColor" onchange="updatePaper()">
    <option value="white">White</option>
    <option value="yellow">Yellow</option>
  </select>

  <select id="template" onchange="updatePaper()">
    <option value="blank">Blank</option>
    <option value="lines">Lines</option>
    <option value="grid">Grid</option>
  </select>
</div>

<div id="canvas-container">
  <canvas id="hwCanvas"></canvas>
</div>

<script>
  const canvas = document.getElementById('hwCanvas');
  const ctx = canvas.getContext('2d');
  let isDrawing = false;
  let noteData = { paper: 'white', template: 'blank', imageData: null };

  const bridge = new ComponentRelay({
    targetWindow: window,
    onReady: () => { console.log("Quill Ready"); }
  });

  function init() {
    canvas.width = 850;
    canvas.height = 1200;
    ctx.fillStyle = '#fdfcf0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    render();
  }

  function updatePaper() {
    const paper = document.getElementById('paperColor').value;
    const tpl = document.getElementById('template').value;
    canvas.style.backgroundColor = paper === 'yellow' ? '#fef9c3' : '#fdfcf0';
    canvas.className = tpl !== 'blank' ? `tpl-${tpl}` : '';
    noteData.paper = paper;
    noteData.template = tpl;
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    // Support S-Pen (Pointer) and Finger (Touch)
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  }

  function start(e) {
    isDrawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    if (document.getElementById('tool').value === 'eraser') {
      ctx.strokeStyle = canvas.style.backgroundColor || '#fdfcf0';
      ctx.lineWidth = 40;
    } else {
      ctx.strokeStyle = document.getElementById('penColor').value;
      const pressure = (e.pressure && e.pressure > 0) ? e.pressure : 0.5;
      ctx.lineWidth = 3 * pressure;
    }
    ctx.moveTo(pos.x, pos.y);
  }

  function move(e) {
    if (!isDrawing) return;
    const pos = getPos(e);
    if (document.getElementById('tool').value === 'pen') {
      const pressure = (e.pressure && e.pressure > 0) ? e.pressure : 0.5;
      ctx.lineWidth = 3 * pressure;
    }
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  }

  function stop() {
    if (isDrawing) {
      isDrawing = false;
      save();
    }
  }

  // Samsung S25U S-Pen works best with PointerEvents
  canvas.addEventListener('pointerdown', start);
  canvas.addEventListener('pointermove', move);
  canvas.addEventListener('pointerup', stop);
  canvas.addEventListener('pointerout', stop);

  function save() {
    bridge.saveItemWithPayload({
      content: {
        text: JSON.stringify({ ...noteData, imageData: canvas.toDataURL("image/png") }),
        preview_title: "Quill Sketch"
      }
    });
  }

  function render() {
    bridge.streamContextItem((item) => {
      if (item.content.text) {
        try {
          const data = JSON.parse(item.content.text);
          if (data.imageData) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = data.imageData;
          }
        } catch(e) {}
      }
    });
  }

  init();
</script>
</body>
</html>
