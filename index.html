<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://app.standardnotes.com/component-relay.js"></script>
  <style>
    :root {
      --paper-white: #fdfcf0;
      --paper-yellow: #fef9c3;
      --paper-blue: #2b4570;
      --grid-color: rgba(0, 0, 0, 0.08);
    }

    body, html { 
      margin: 0; padding: 0; height: 100%; 
      background: #1a1a1a; overflow: hidden; 
      font-family: -apple-system, sans-serif;
      touch-action: none;
    }

    #toolbar {
      position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
      background: #222; padding: 8px 15px; border-radius: 25px; 
      display: flex; gap: 10px; z-index: 100; border: 1px solid #444;
      align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    #canvas-container {
      height: 100vh; width: 100vw; 
      display: block;
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      touch-action: none;
      display: block;
      cursor: crosshair;
      z-index: 5;
    }

    /* Template Patterns */
    .tpl-lines {
      background-image: linear-gradient(var(--grid-color) 1px, transparent 1px) !important;
      background-size: 100% 32px !important;
    }
    .tpl-grid {
      background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), 
                        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px) !important;
      background-size: 32px 32px !important;
    }
    .tpl-dots {
      background-image: radial-gradient(var(--grid-color) 1.5px, transparent 1.5px) !important;
      background-size: 32px 32px !important;
    }

    select, button { 
      background: #333; color: #eee; border: 1px solid #555; 
      padding: 5px 8px; border-radius: 6px; font-size: 12px;
    }

    .brand { color: #fff; font-weight: bold; margin-right: 5px; font-size: 12px; opacity: 0.8; }
  </style>
</head>
<body>

<div id="toolbar">
  <span class="brand">QUILL</span>
  
  <select id="penColor">
    <option value="#18181b">Ink Black</option>
    <option value="#1e3a8a">Ink Blue</option>
    <option value="#b91c1c">Ink Red</option>
    <option value="#e2e8f0">Ink Silver</option>
    <option value="#ffffff">Ink White</option>
  </select>

  <select id="paperColor" onchange="updateUI()">
    <option value="white">White</option>
    <option value="yellow">Post-it</option>
    <option value="blue">Const. Blue</option>
  </select>

  <select id="template" onchange="updateUI()">
    <option value="blank">Blank</option>
    <option value="lines">Lines</option>
    <option value="grid">Grid</option>
    <option value="dots">Dots</option>
  </select>
  
  <select id="tool">
    <option value="pen">Pen</option>
    <option value="eraser">Eraser</option>
  </select>

  <button id="clearBtn">Clear</button>
</div>

<div id="canvas-container">
  <canvas id="hwCanvas"></canvas>
</div>

<script>
  const canvas = document.getElementById('hwCanvas');
  const container = document.getElementById('canvas-container');
  const ctx = canvas.getContext('2d');
  let isDrawing = false;
  let bridge = null;
  let currentNoteData = { paper: 'white', template: 'blank' };

  try {
    if (typeof ComponentRelay !== 'undefined') {
      bridge = new ComponentRelay({
        targetWindow: window,
        onReady: () => { console.log("Bridge Active"); }
      });
    }
  } catch (e) { console.warn("Standalone Mode"); }

  function updateUI() {
    const paper = document.getElementById('paperColor').value;
    const tpl = document.getElementById('template').value;
    
    container.style.backgroundColor = `var(--paper-${paper})`;
    
    // Light grid for blue paper, dark for others
    const gridOpacity = paper === 'blue' ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.08)';
    document.documentElement.style.setProperty('--grid-color', gridOpacity);
    
    container.className = tpl === 'blank' ? '' : `tpl-${tpl}`;
    
    currentNoteData.paper = paper;
    currentNoteData.template = tpl;
  }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight;
    
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    
    ctx.scale(dpr, dpr);
    render();
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX || (e.touches && e.touches[0].clientX);
    const cy = e.clientY || (e.touches && e.touches[0].clientY);
    return { x: cx - rect.left, y: cy - rect.top };
  }

  function start(e) {
    isDrawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    if (document.getElementById('tool').value === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.lineWidth = 40;
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = document.getElementById('penColor').value;
      const p = (e.pressure && e.pressure > 0) ? e.pressure : 0.5;
      ctx.lineWidth = 4 * p;
    }
    ctx.moveTo(pos.x, pos.y);
    if (e.cancelable) e.preventDefault();
  }

  function move(e) {
    if (!isDrawing) return;
    const pos = getPos(e);
    if (document.getElementById('tool').value === 'pen') {
      const p = (e.pressure && e.pressure > 0) ? e.pressure : 0.5;
      ctx.lineWidth = 4 * p;
    }
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    if (e.cancelable) e.preventDefault();
  }

  function stop() {
    if (isDrawing) {
      isDrawing = false;
      save();
    }
  }

  canvas.addEventListener('pointerdown', start);
  window.addEventListener('pointermove', move);
  window.addEventListener('pointerup', stop);
  canvas.addEventListener('touchstart', (e) => { if(e.cancelable) e.preventDefault(); }, {passive: false});

  document.getElementById('clearBtn').onclick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    save();
  };

  function save() {
    if (bridge) {
      bridge.saveItemWithPayload({
        content: {
          text: JSON.stringify({ 
            ...currentNoteData,
            imageData: canvas.toDataURL("image/png") 
          }),
          preview_title: "Quill Sketch"
        }
      });
    }
  }

  function render() {
    if (bridge) {
      bridge.streamContextItem((item) => {
        if (item.content.text) {
          try {
            const data = JSON.parse(item.content.text);
            if (data.paper) document.getElementById('paperColor').value = data.paper;
            if (data.template) document.getElementById('template').value = data.template;
            updateUI();
            
            if (data.imageData) {
              const img = new Image();
              img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, window.innerWidth, window.innerHeight);
              };
              img.src = data.imageData;
            }
          } catch(e) {}
        }
      });
    } else {
      updateUI();
    }
  }

  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
