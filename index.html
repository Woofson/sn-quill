<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://app.standardnotes.com/component-relay.js"></script>
  <style>
    :root {
      --paper-white: #fdfcf0; --paper-yellow: #fef9c3; --paper-blue: #2b4570;
      --grid-color: rgba(0, 0, 0, 0.08); --accent: #3b82f6; --bg-panel: rgba(25, 25, 25, 0.95);
    }
    body, html { margin: 0; padding: 0; height: 100%; background: #111; overflow: hidden; font-family: sans-serif; touch-action: none; }
    
    #toolbar {
      position: fixed; top: 20px; left: 20px; background: var(--bg-panel); 
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 8px; border-radius: 18px; display: flex; gap: 8px; z-index: 100; 
      border: 1px solid rgba(255,255,255,0.1); align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    
    #page-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--bg-panel); padding: 8px 16px; border-radius: 20px;
      display: flex; gap: 15px; align-items: center; color: white; z-index: 100;
      border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    }

    .tool-btn {
      width: 42px; height: 42px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.05); color: #ccc; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .tool-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .tool-btn.active { background: var(--accent); color: white; }
    .tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .popover {
      position: absolute; background: #1e1e1e; border: 1px solid #333; border-radius: 16px;
      padding: 18px; display: none; flex-direction: column; gap: 12px; z-index: 110;
      box-shadow: 0 15px 45px rgba(0,0,0,0.7); color: white; width: 200px;
    }

    #canvas-container { height: 100vh; width: 100vw; position: relative; overflow: hidden; background: var(--paper-white); }
    canvas { position: absolute; top: 0; left: 0; touch-action: none; cursor: crosshair; }
    
    #cursor-guide {
      position: fixed; pointer-events: none; border: 1px solid rgba(128, 128, 128, 0.5);
      border-radius: 50%; z-index: 9999; transform: translate(-50%, -50%); display: none;
    }
  </style>
</head>
<body>

<div id="cursor-guide"></div>

<div id="toolbar">
  <div class="handle" style="cursor:grab; padding:5px; color:#555">⠿</div>
  <div id="penBtn" class="tool-btn active"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg></div>
  <div id="eraserBtn" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.008 4.008 0 0 1-5.66 0L2.81 17c-.78-.79-.78-2.05 0-2.84l10.6-10.6c.79-.78 2.05-.78 2.83 0z"/></svg></div>
  <div style="width:1px; height:24px; background:#444; margin:0 4px;"></div>
  <div id="undoBtn" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></div>
  <div id="redoBtn" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg></div>
  <div id="settingsBtn" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></div>
</div>

<div id="page-nav">
  <div id="prevPage" class="tool-btn" style="width:30px; height:30px;">◀</div>
  <span id="pageDisplay" style="font-size:14px; font-weight:bold; min-width:60px; text-align:center;">Page 1</span>
  <div id="nextPage" class="tool-btn" style="width:30px; height:30px;">▶</div>
</div>

<div id="canvas-container"><canvas id="hwCanvas"></canvas></div>

<script>
  const canvas = document.getElementById('hwCanvas'), ctx = canvas.getContext('2d'), guide = document.getElementById('cursor-guide');
  let bridge = null, tool = 'pen', isDrawing = false;
  
  // Transform State
  let scale = 1, offsetX = 0, offsetY = 0;
  let pages = [[]]; // Array of action histories per page
  let redoStack = [];
  let currentPage = 0;

  let config = { width: 4, eraser: 40, ink: '#18181b', pressure: true };

  function initCanvas() {
    canvas.width = window.innerWidth * window.devicePixelRatio;
    canvas.height = window.innerHeight * window.devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    redraw();
  }

  function redraw() {
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);

    pages[currentPage].forEach(stroke => {
      ctx.beginPath();
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width;
      ctx.globalCompositeOperation = stroke.type === 'eraser' ? 'destination-out' : 'source-over';
      stroke.points.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();
    });
  }

  // Input Handling
  let lastX, lastY, p1, p2, initialDist, initialScale;

  canvas.onpointerdown = (e) => {
    if (e.buttons === 4 || (e.pointerType === 'touch' && e.isPrimary === false)) return; // Middle click or 2nd finger
    isDrawing = true;
    const pos = screenToCanvas(e.clientX, e.clientY);
    const stroke = { 
      type: tool, 
      color: config.ink, 
      width: tool === 'eraser' ? config.eraser : config.width,
      points: [pos] 
    };
    pages[currentPage].push(stroke);
    redoStack = [];
  };

  window.onpointermove = (e) => {
    if (isDrawing) {
      const pos = screenToCanvas(e.clientX, e.clientY);
      const currentStroke = pages[currentPage][pages[currentPage].length - 1];
      currentStroke.points.push(pos);
      redraw();
    }
    
    // Guide cursor
    guide.style.display = 'block';
    guide.style.left = e.clientX + 'px'; guide.style.top = e.clientY + 'px';
    guide.style.width = (tool === 'eraser' ? config.eraser : config.width) * scale + 'px';
    guide.style.height = (tool === 'eraser' ? config.eraser : config.width) * scale + 'px';
  };

  window.onpointerup = () => { if(isDrawing) { isDrawing = false; save(); } };

  // Pinch Zoom Logic (simplified for brevity)
  window.onwheel = (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    scale *= delta;
    redraw();
  };

  function screenToCanvas(x, y) {
    return { x: (x - offsetX) / scale, y: (y - offsetY) / scale };
  }

  // Page Controls
  document.getElementById('nextPage').onclick = () => {
    if (currentPage === pages.length - 1) pages.push([]);
    currentPage++;
    updatePageUI();
  };
  document.getElementById('prevPage').onclick = () => {
    if (currentPage > 0) currentPage--;
    updatePageUI();
  };

  function updatePageUI() {
    document.getElementById('pageDisplay').innerText = `Page ${currentPage + 1}`;
    redraw();
  }

  // Undo / Redo
  document.getElementById('undoBtn').onclick = () => {
    if (pages[currentPage].length > 0) {
      redoStack.push(pages[currentPage].pop());
      redraw();
      save();
    }
  };
  document.getElementById('redoBtn').onclick = () => {
    if (redoStack.length > 0) {
      pages[currentPage].push(redoStack.pop());
      redraw();
      save();
    }
  };

  function save() {
    if (bridge) {
      bridge.saveItemWithPayload({
        content: { text: JSON.stringify({ pages, currentPage }), preview_title: "Quill Notebook" }
      });
    }
  }

  document.getElementById('penBtn').onclick = () => { tool = 'pen'; document.getElementById('penBtn').classList.add('active'); document.getElementById('eraserBtn').classList.remove('active'); };
  document.getElementById('eraserBtn').onclick = () => { tool = 'eraser'; document.getElementById('eraserBtn').classList.add('active'); document.getElementById('penBtn').classList.remove('active'); };

  window.onresize = initCanvas;
  initCanvas();
  try { bridge = new ComponentRelay({ targetWindow: window }); } catch(e){}
</script>
</body>
</html>
