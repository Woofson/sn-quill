<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
  <script src="https://app.standardnotes.com/component-relay.js"></script>
</head>
<body>

<div id="cursor-guide"></div>

<div id="toolbar">
  <div class="handle">
    <svg viewBox="0 0 24 24" class="icon-svg"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
  </div>
  <div id="penBtn" class="tool-btn active"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg></div>
  <div id="eraserBtn" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.008 4.008 0 0 1-5.66 0L2.81 17c-.78-.79-.78-2.05 0-2.84l10.6-10.6c.79-.78 2.05-.78 2.83 0z"/></svg></div>
  <div class="divider"></div>
  <div id="undoBtn" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></div>
  <div id="redoBtn" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg></div>
  <div id="settingsBtn" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></div>
</div>

<div id="penPopover" class="popover">
  <label>Color</label>
  <div class="color-grid">
    <div class="swatch selected" data-color="#18181b" id="swatch-1"></div>
    <div class="swatch" data-color="#1e3a8a" id="swatch-2"></div>
    <div class="swatch" data-color="#b91c1c" id="swatch-3"></div>
    <div class="swatch" data-color="#15803d" id="swatch-4"></div>
    <div class="swatch" data-color="#ffffff" id="swatch-5"></div>
  </div>
  <label class="margin-top-10">Width <span id="lwVal" class="val-display">4</span></label>
  <input type="range" id="lineWidth" min="1" max="40" value="4">
  <div class="row popover-row"><label>Pressure</label><input type="checkbox" id="usePressure" checked></div>
</div>

<div id="eraserPopover" class="popover">
  <label>Eraser <span id="esVal" class="val-display">40</span></label>
  <input type="range" id="eraserSize" min="5" max="150" value="40">
  <button id="clearBtn" class="danger-btn">Clear Page</button>
</div>

<div id="settingsModal">
  <div class="modal-content">
    <h3>Settings</h3>
    <div class="row"><label>Orientation</label><select id="setOrient"><option value="horiz">Horizontal</option><option value="vert">Vertical</option></select></div>
    <div class="row"><label>Paper</label><select id="paperColor"><option value="white">White</option><option value="yellow">Yellow</option><option value="blue">Blue</option></select></div>
    <div class="row"><label>Template</label><select id="template"><option value="blank">Blank</option><option value="lines">Lines</option><option value="grid">Grid</option><option value="dots">Dots</option></select></div>
    <button id="closeSettings" class="apply-btn">Apply</button>
  </div>
</div>

<div id="page-nav">
  <div id="prevPage" class="tool-btn nav-btn">◀</div>
  <span id="pageDisplay">Page 1</span>
  <div id="nextPage" class="tool-btn nav-btn">▶</div>
  <div id="resetView" class="tool-btn nav-btn margin-left-8">⌖</div>
</div>

<div id="canvas-container"><canvas id="hwCanvas"></canvas></div>

<script src="app.js"></script>
</body>
</html>
